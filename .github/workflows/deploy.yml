name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # npm ci fails here due to upstream lockfile drift in Vite 8's Rolldown optional
      # native bindings (@rolldown/binding-*): a Windows-generated lockfile doesn't
      # carry every Linux-specific optional subtree, so npm ci's strict verification
      # rejects it. npm install resolves what this platform actually needs instead.
      - run: npm install
      - run: npm run test:run
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      # actions/deploy-pages occasionally gets a transient "Deployment failed,
      # try again later" from GitHub's Pages backend (seen on run 28719715877)
      # even though the artifact and config are fine — a fresh attempt succeeds
      # immediately after. Retry once instead of leaving main broken until the
      # next unrelated push happens to redeploy.
      - name: Wait before retrying deployment
        if: steps.deployment.outcome == 'failure'
        run: sleep 15

      - name: Retry deployment
        if: steps.deployment.outcome == 'failure'
        id: deployment_retry
        uses: actions/deploy-pages@v4
